name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Build package
        run: |
          uv build

      - name: Check package
        run: |
          uv publish --dry-run dist/*

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ (a|alpha|b|beta|rc|dev) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tui:
    name: Build TUI (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --manifest-path crates/mobius-tui/Cargo.toml --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp crates/mobius-tui/target/${{ matrix.target }}/release/mobius-tui mobius-tui-${{ matrix.target }}

      - name: Re-sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - mobius-tui-${{ matrix.target }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: |
          cp crates/mobius-tui/target/${{ matrix.target }}/release/mobius-tui.exe mobius-tui-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobius-tui-${{ matrix.target }}
          path: mobius-tui-${{ matrix.target }}*

  attach-tui-binaries:
    name: Attach TUI Binaries to Release
    runs-on: ubuntu-latest
    needs: [release, build-tui]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mobius-tui-*
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: mobius-tui-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Build package
        run: |
          uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish --check-url https://pypi.org/simple/ dist/*
